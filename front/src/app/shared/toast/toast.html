<div class="toast-container">
  @for (toast of service.toasts(); track toast.id) {
    <div class="toast-item" [class.toast-success]="toast.type === 'success'" [class.toast-error]="toast.type === 'error'" [class.toast-info]="toast.type === 'info'">
      <span>{{ toast.message }}</span>
      <button class="toast-close" (click)="service.remove(toast.id)">&times;</button>
    </div>
  }
</div>
