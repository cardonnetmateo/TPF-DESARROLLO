<div class="row justify-content-center mt-5">
  <div class="col-md-5 col-lg-4">
    <div class="card shadow-sm">
      <div class="card-body p-4 text-center">

        @if (!sent()) {
          <i class="bi bi-key display-4" style="color: var(--primary)"></i>
          <h3 class="mt-3 fw-bold">¿Olvidaste tu contraseña?</h3>
          <p class="text-muted mt-2">
            Ingresá tu email y te enviaremos un link para restablecerla.
          </p>

          <form (ngSubmit)="submit()" #form="ngForm" class="text-start mt-3">
            <div class="mb-3">
              <label for="email" class="form-label fw-medium">Email</label>
              <input
                id="email"
                type="email"
                class="form-control"
                [(ngModel)]="email"
                name="email"
                required
                email
                placeholder="ejemplo@correo.com"
              />
            </div>

            <button type="submit" class="btn btn-primary w-100" [disabled]="form.invalid || loading()">
              @if (loading()) {
                <span class="spinner-border spinner-border-sm me-1"></span>
              }
              Enviar link
            </button>
          </form>
        }

        @if (sent()) {
          <i class="bi bi-envelope-check display-4" style="color: var(--primary)"></i>
          <h3 class="mt-3 fw-bold">Revisá tu email</h3>
          <p class="text-muted mt-2">
            Si el email existe, recibirás un link para restablecer tu contraseña.
          </p>
          <a routerLink="/login" class="btn btn-primary w-100 mt-3">Volver a iniciar sesión</a>
        }

        <p class="mt-4 text-muted mb-0">
          <a routerLink="/login">Volver a iniciar sesión</a>
        </p>
      </div>
    </div>
  </div>
</div>
