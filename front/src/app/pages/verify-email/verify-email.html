<div class="row justify-content-center mt-5">
  <div class="col-md-5 col-lg-4">
    <div class="card shadow-sm">
      <div class="card-body p-4 text-center">

        @if (success()) {
          <i class="bi bi-check-circle display-4" style="color: #198754"></i>
          <h3 class="mt-3 fw-bold">Email verificado correctamente</h3>
          <p class="text-muted mt-2">Tu cuenta ya está activa.</p>
          <a routerLink="/" class="btn btn-primary w-100 mt-3">Ir al inicio</a>
        }

        @if (error()) {
          <i class="bi bi-exclamation-triangle display-4" style="color: #dc3545"></i>
          <h3 class="mt-3 fw-bold">Error de verificación</h3>
          <p class="text-muted mt-2">{{ error() }}</p>
          <p class="text-muted">Para reenviar el email, primero iniciá sesión.</p>
          <a routerLink="/login" class="btn btn-primary w-100 mt-3">Ir a iniciar sesión</a>
        }

      </div>
    </div>
  </div>
</div>
