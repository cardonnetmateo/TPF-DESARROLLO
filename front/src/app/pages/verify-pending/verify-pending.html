<div class="row justify-content-center mt-5">
  <div class="col-md-5 col-lg-4">
    <div class="card shadow-sm">
      <div class="card-body p-4 text-center">
        <i class="bi bi-envelope-check display-4" style="color: var(--primary)"></i>
        <h3 class="mt-3 fw-bold">Revisá tu email</h3>
        <p class="text-muted mt-2">
          Te enviamos un link de verificación a tu correo electrónico.
          Hacé clic en el link para activar tu cuenta.
        </p>

        @if (sent()) {
          <div class="alert alert-success" role="alert">
            <i class="bi bi-check-circle me-1"></i>Email reenviado correctamente.
          </div>
        }

        <button class="btn btn-outline-primary w-100 mt-3" (click)="resend()" [disabled]="sending()">
          @if (sending()) {
            <span class="spinner-border spinner-border-sm me-1"></span>
          }
          Reenviar email
        </button>

        <p class="mt-4 text-muted mb-0">
          <a routerLink="/login">Volver a iniciar sesión</a>
        </p>
      </div>
    </div>
  </div>
</div>
